<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ガールズメイドプディング - Recipe Book</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <h1 data-i18n="title">レシピ図鑑</h1>
        <p class="subtitle" data-i18n="subtitle">ガールズメイドプディング</p>
      </div>

      <div class="controls">
        <div class="field lang-field">
          <span class="field-label" data-i18n="languageLabel">Language</span>
          <div class="select" id="lang-select" role="listbox" tabindex="0" aria-haspopup="listbox" aria-expanded="false">
            <span class="select-current">日本語</span>
            <svg class="select-caret" width="10" height="6" viewBox="0 0 10 6" aria-hidden="true"><path d="M1 1l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <ul class="select-menu" role="listbox">
              <li class="select-opt" data-value="jp" role="option">日本語</li>
              <li class="select-opt" data-value="en" role="option">English</li>
              <li class="select-opt" data-value="zhcn" role="option">简体中文</li>
              <li class="select-opt" data-value="zhtw" role="option">繁體中文</li>
            </ul>
          </div>
        </div>
        <label class="field file-field">
          <button id="open-import" class="btn" type="button" data-i18n="importSave">セーブデータを読み込む</button>
          <input id="save-file" type="file" accept=".json,application/json" hidden />
        </label>
        <button id="clear-save" class="btn ghost" type="button" data-i18n="clearSave" hidden>
          読み込みをリセット
        </button>
        <div class="stats" id="stats">0 / 0</div>
      </div>
    </header>

    <main>
      <aside class="inventory-panel">
        <h2 data-i18n="inventory">手持ちの食材</h2>
        <p class="hint" data-i18n="inventoryHint">クリックで＋1／右クリックで−1</p>
        <ul class="inventory-list" id="inventory-list"></ul>
      </aside>

      <section class="recipe-wall" id="recipe-wall"></section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <div class="modal" id="import-modal" role="dialog" aria-modal="true" aria-labelledby="import-modal-title" hidden>
      <div class="modal-backdrop"></div>
      <div class="modal-card">
        <h3 id="import-modal-title" data-i18n="importModalTitle">セーブデータを選択</h3>
        <p class="modal-body" data-i18n="importModalBody">
          下のパスをコピーし、このあと開くダイアログのパス欄に貼り付けてください。
        </p>
        <div class="path-box">
          <code id="save-path">%USERPROFILE%/AppData/LocalLow/kazuhideoka/girls-made-pudding</code>
          <button id="copy-path" class="btn ghost" type="button" data-i18n="copyPath">コピー</button>
        </div>
        <div class="modal-actions">
          <button id="cancel-import" class="btn ghost" type="button" data-i18n="cancel">キャンセル</button>
          <button id="confirm-import" class="btn" type="button" data-i18n="gotIt">分かった</button>
        </div>
      </div>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
